name: Mirror Firebase To Supabase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run migration in dry-run mode"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: supabase-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check mojibake
        run: npm run check:mojibake
        continue-on-error: true

      - name: Validate migration secrets
        run: |
          test -n "$FIREBASE_PROJECT_ID" || (echo "Missing FIREBASE_PROJECT_ID" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON" || (echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON" && exit 1)

      - name: Dry-run mirror
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm run migrate:all:supabase -- --dry-run

      - name: Run mirror
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: npm run migrate:all:supabase
